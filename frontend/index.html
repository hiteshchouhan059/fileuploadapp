<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Uploader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container minimalist">
        <header>
            <h1>Upload Files</h1>
            <p>Share your documents securely</p>
        </header>

        <form id="uploadForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h3>Drag & Drop files here</h3>
                <p>or</p>
                <label class="file-btn" for="fileInput">Browse Files</label>
                <input type="file" id="fileInput" name="files" multiple hidden>
            </div>

            <div class="file-list" id="fileList">
                <!-- Selected files will appear here -->
            </div>

            <button type="submit" id="submitBtn" class="submit-btn" disabled>Upload Files</button>
        </form>

        <div id="messageBox" class="message-box hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
